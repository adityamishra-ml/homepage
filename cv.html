<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>CV – Aditya Mishra</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav>
    <div class="nav-inner">
    <div class="brand">Aditya Mishra</div>

    <button class="menu-toggle">☰</button>

    <ul class="nav-menu">
        <li><a href="index.html">About</a></li>
        <li><a href="research.html">Research</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="publications.html">Publications</a></li>
        <li><a href="news.html">News</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="cv.html" class="active">CV</a></li>
    </ul>
  <label class="theme-switch">
    <input type="checkbox" id="theme-toggle">
    <span class="slider">
      <span class="sun">☀</span>
      <span class="moon">🌙</span>
    </span>
  </label>
  </div>
  </nav>

  <main class="container">
    <header class="cv-header">
      <h1>Curriculum Vitae</h1>
    </header>

    <div class="pdf-container">
      <!-- OPTION A: iframe -->
      <iframe src="documents/CV.pdf#view=FitH" title="Aditya Mishra CV"></iframe>

      <!-- OPTION B: object fallback -->
      <!--
      <object data="CV.pdf#view=FitH" type="application/pdf">
        <p>Your browser does not support embedded PDFs. 
           <a href="documents/CV.pdf">Download the PDF</a>.</p>
      </object>
      -->
    </div>
  </main>
<script>

// hamburger menu

const menuToggle = document.querySelector(".menu-toggle");
const menu = document.querySelector(".nav-menu");

menuToggle.addEventListener("click", () => {
  menu.classList.toggle("active");
});


// theme toggle

const themeToggle = document.getElementById("theme-toggle");

const prefersDark = window.matchMedia("(prefers-color-scheme: dark)");

function setTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
}

const savedTheme = localStorage.getItem("theme");

if(savedTheme){
  setTheme(savedTheme);
  themeToggle.checked = savedTheme === "dark";
}
else if(prefersDark.matches){
  setTheme("dark");
  themeToggle.checked = true;
}

themeToggle.addEventListener("change", () => {

  if(themeToggle.checked){
    setTheme("dark");
  }
  else{
    setTheme("light");
  }

});

</script>
</body>
</html>
